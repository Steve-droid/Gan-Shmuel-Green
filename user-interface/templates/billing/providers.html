{% extends "base.html" %}
{% block title %}Providers{% endblock %}

{% block content %}
<h2 class="mb-4 fw-bold">Providers</h2>

<div class="row g-4">
  <!-- Create -->
  <div class="col-lg-6">
    <div class="card border-0 bg-body-secondary h-100">
      <div class="card-body p-4">
        <h6 class="fw-semibold mb-3"><i class="bi bi-plus-circle me-2 text-success"></i>Create Provider</h6>
        <form method="POST">
          <input type="hidden" name="action" value="create">
          <div class="mb-3">
            <label for="name" class="form-label">Provider Name</label>
            <input type="text" class="form-control" id="name" name="name"
                   placeholder="e.g. Orchard Farms Ltd." required>
          </div>
          <button type="submit" class="btn btn-success w-100">
            <i class="bi bi-plus-circle me-2"></i>Create
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- Update -->
  <div class="col-lg-6">
    <div class="card border-0 bg-body-secondary h-100">
      <div class="card-body p-4">
        <h6 class="fw-semibold mb-3"><i class="bi bi-pencil me-2 text-warning"></i>Rename Provider</h6>
        <form method="POST">
          <input type="hidden" name="action" value="update">
          <div class="mb-3">
            <label for="provider_id" class="form-label">Provider ID</label>
            <input type="text" class="form-control font-monospace" id="provider_id" name="provider_id"
                   placeholder="e.g. 3" required>
          </div>
          <div class="mb-3">
            <label for="new_name" class="form-label">New Name</label>
            <input type="text" class="form-control" id="new_name" name="new_name"
                   placeholder="New provider name" required>
          </div>
          <button type="submit" class="btn btn-warning w-100 text-dark">
            <i class="bi bi-pencil me-2"></i>Update
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<div class="mt-4 p-4 bg-body-secondary rounded">
  <h6 class="fw-semibold mb-2 text-muted"><i class="bi bi-info-circle me-2"></i>Note</h6>
  <p class="mb-0 text-muted small">
    Provider IDs are assigned automatically on creation. Use the Billing — Invoice page
    to view what a provider has delivered and owes.
  </p>
</div>
{% endblock %}
