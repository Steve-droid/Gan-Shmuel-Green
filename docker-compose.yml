services:
  ci:
    build:
      context: .
      dockerfile: ci/Dockerfile
    ports:
      - "8085:8085"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/repo
    environment:
      - REPO_DIR=/repo
      - BILLING_URL=http://host.docker.internal:8083
      - WEIGHT_SERVICE_URL=http://host.docker.internal:8082
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
  
  billing:
    build: ./billing
    ports:
      - "8081:5001"
    environment:
      - DB_HOST=billing-db
      - DB_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - WEIGHT_SERVICE_URL=http://weight:5000
    volumes:
      - ./resources/sample_files/sample_uploads:/app/in
    depends_on:
      - weight
      - billing-db
    restart: unless-stopped

  billing-db:
    image: mysql:8.4
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    volumes:
      - ./resources/db_schemas/multi-db/billingdb.sql:/docker-entrypoint-initdb.d/billingdb.sql
    restart: unless-stopped
  
  weight:
    build: ./weight
    ports:
      - "8080:5000"
    environment:
      - DB_HOST=weight-db
      - DB_USER=root
      - DB_NAME=weight
      - DB_PORT=3306
      - DB_PASSWORD=${MYSQL_ROOT_PASSWORD}
    volumes:
      - ./resources/sample_files/sample_uploads:/app/in
    depends_on:
      - weight-db
    restart: unless-stopped

  weight-db:
    image: mysql:8.4
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    volumes:
      - ./resources/db_schemas/multi-db/weightdb.sql:/docker-entrypoint-initdb.d/weightdb.sql
    restart: unless-stopped

  ui:
    build: ./user-interface
    ports:
      - "8084:5000"
    environment:
      - WEIGHT_URL=http://weight:5000
      - BILLING_URL=http://billing:5001
      - PORT=5000
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      - weight
      - billing
    restart: unless-stopped

