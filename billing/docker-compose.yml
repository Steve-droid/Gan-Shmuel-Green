version : '3.8'

services:
  billing-app:
    build: .
    ports:
      - "5001:5001"
    volumes:
    - ./in:/app/in
    depends_on:
      billing-db:
        condition: service_healthy
    environment:
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      WEIGHT_SERVICE_URL: http://weight-app:5000
    networks:
      - billing-net
      - gan-shmuel-net

  billing-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - ./app/db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - billing-net

networks:
  billing-net:
  gan-shmuel-net:
    external: true
